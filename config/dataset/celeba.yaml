training:
  dataset: celeb_a

model:
  gen:
    image_res: 64
    blocks:
      - channels: 512
        kernel_size: 4
        stride: 1
        padding: VALID
      - channels: 256
        kernel_size: 4
        stride: 2
        padding: SAME
      - channels: 128
        kernel_size: 4
        stride: 2
        padding: SAME
      - channels: 64
        kernel_size: 4
        stride: 2
        padding: SAME
