dataset: cifar10
epochs: 100
global_batch_size: 128
image_res: 32

model_overrides:
  gen:
    blocks:
      - channels: 1024
        kernel_size: 4
        stride: 1
        padding: VALID
      - channels: 512
        kernel_size: 4
        stride: 2
        padding: SAME
      - channels: 256
        kernel_size: 4
        stride: 2
        padding: SAME
