dataset: cifar10
epochs: 10
global_batch_size: 32
image_res: 32

model_overrides:
  gen:
    blocks:
      - channels: 256
        kernel_size: 4
        stride: 1
        padding: VALID
      - channels: 128
        kernel_size: 4
        stride: 2
        padding: SAME
      - channels: 64
        kernel_size: 4
        stride: 2
        padding: SAME
