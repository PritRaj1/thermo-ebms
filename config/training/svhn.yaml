dataset: svhn_cropped
epochs: 100
batch_size: 128

model_overrides:
  gen:
    image_res: 32
    blocks:
      - channels: 256
        kernel_size: 4
        stride: 1
        padding: VALID
      - channels: 128
        kernel_size: 4
        stride: 2
        padding: SAME
      - channels: 64
        kernel_size: 4
        stride: 2
        padding: SAME
