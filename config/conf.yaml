ebm:
  energy_dim = 100
  leakyrelu_leak = 0.1
  p0_stddev = 1.0
  mcmc_step_size = 0.4
  mcmc_numsteps = 60
  lr_init = 0.00002
  lr_end = 0.00001
  lr_decay = 0.975
  lr_beta1 = 0.999
  lr_beta2 = 0.5

gen:
  energy_dim = 100
  img_channels = 3
  image_res = 32
  leakyrelu_leak = 0.2
  gaussian_stddev = 0.3
  mcmc_step_size = 0.01
  mcmc_numsteps = 20
  lr_init = 0.0001
  lr_end = 0.00005
  lr_decay = 0.975
  lr_beta1 = 0.999
  lr_beta2 = 0.5

model:
  z_dim = 80
  seed = 0

thermo:
  num_temps = 10
  xchange_every = 2

training:
  epochs=5
  dataset = "cifar10"
  batch_size = 128

lr_schedule:
  begin = 1
  step = 1 

logging:
  logdir = "logs/thermo/cifar10/"
  ckpt_dit = "logs/thermo/cifar10/"
  ckpt_every = 2
  eval_every = 2
  sample_every = 2
  num_samples = 100

unbiased_metrics:
  batch_size_to_generate = 2000
  num_samples = 20000
  regression_steps = 2000, 4000, 6000, 8000, 10000, 12000, 14000, 16000, 18000, 20000
