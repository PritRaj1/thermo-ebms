[project]
name = "jax-thermoebm"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "flax>=0.12.7",
    "grain>=0.2.17",
    "jax[cuda12]>=0.10.1",
    "ml-collections>=1.1.0",
    "optax>=0.2.8",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
pytest = [
    "matplotlib>=3.10.9",
    "ruff>=0.15.17",
]

[tool.ruff]
line-length = 88
target-version = "py312"
include = ["*.py", "*.pyi", "*.ipynb"]
exclude = [
    ".git",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
extend-select = ["UP"] 
# ignore = ["E501"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "tab"
skip-magic-trailing-comma = false

